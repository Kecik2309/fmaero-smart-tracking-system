<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FMAERO Smart Tracking System - Forgot Password</title>
  <style>
    :root {
      --bg: #e5e7eb;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --border: #d1d5db;
      --primary: #0b3a75;
      --primary-hover: #082b57;
      --success-bg: #dcfce7;
      --success-text: #166534;
      --shadow: 0 20px 45px rgba(15, 23, 42, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .forgot-card {
      width: 100%;
      max-width: 420px;
      background: var(--card);
      border-radius: 18px;
      padding: 40px 32px;
      box-shadow: var(--shadow);
    }

    .company-title {
      margin: 0 0 10px;
      text-align: center;
      font-size: 28px;
      line-height: 1.25;
      color: var(--primary);
    }

    .subtitle {
      margin: 0 0 30px;
      text-align: center;
      color: var(--muted);
      font-size: 15px;
    }

    .form-group {
      margin-bottom: 18px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
      font-size: 14px;
    }

    input {
      width: 100%;
      padding: 13px 14px;
      border: 1px solid var(--border);
      border-radius: 10px;
      font-size: 15px;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(11, 58, 117, 0.15);
    }

    .send-button {
      width: 100%;
      border: none;
      border-radius: 10px;
      padding: 14px;
      background: var(--primary);
      color: #ffffff;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s ease, transform 0.2s ease;
    }

    .send-button:hover {
      background: var(--primary-hover);
    }

    .send-button:active {
      transform: translateY(1px);
    }

    .message {
      display: none;
      margin-top: 18px;
      padding: 12px 14px;
      border-radius: 10px;
      background: var(--success-bg);
      color: var(--success-text);
      font-size: 14px;
      text-align: center;
    }

    .message.show {
      display: block;
    }

    .back-link {
      display: inline-block;
      margin-top: 18px;
      color: var(--primary);
      text-decoration: none;
      font-size: 14px;
    }

    .back-link:hover {
      text-decoration: underline;
    }

    @media (max-width: 480px) {
      .forgot-card {
        padding: 30px 22px;
      }

      .company-title {
        font-size: 24px;
      }
    }
  </style>
</head>
<body>
  <div class="forgot-card">
    <h1 class="company-title">FMAERO Smart Tracking System</h1>
    <p class="subtitle">Enter your email to receive a password reset link</p>

    <form id="forgotPasswordForm">
      <div class="form-group">
        <label for="resetEmail">Email</label>
        <input type="email" id="resetEmail" name="resetEmail" placeholder="Enter your email" required>
      </div>

      <button type="submit" class="send-button">Send Reset</button>
      <div id="resetMessage" class="message">Password reset link sent to your email</div>
    </form>

    <a class="back-link" href="login.html">Back to login</a>
  </div>

  <script type="module">
    import { sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { auth } from "./firebase-client.js";

    const forgotPasswordForm = document.getElementById("forgotPasswordForm");
    const resetMessage = document.getElementById("resetMessage");

    forgotPasswordForm.addEventListener("submit", async function (event) {
      event.preventDefault();

      const email = document.getElementById("resetEmail").value.trim().toLowerCase();

      if (!email) {
        resetMessage.classList.remove("show");
        return;
      }

      try {
        await sendPasswordResetEmail(auth, email);
        resetMessage.textContent = "Password reset link sent to your email";
        resetMessage.classList.add("show");
        forgotPasswordForm.reset();
      } catch (error) {
        console.error("Password reset error:", error);
        resetMessage.textContent = "Unable to send reset email. Please verify the email and try again.";
        resetMessage.classList.add("show");
      }
    });
  </script>
</body>
</html>
